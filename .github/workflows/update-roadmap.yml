name: Update Roadmap Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Microsoft roadmap CSV
        run: |
          curl -fsSL \
            "https://www.microsoft.com/releasecommunications/api/v2/m365?responseFormat=csv" \
            -o roadmap.csv

      - name: Parse CSV to JSON
        run: python parse_roadmap.py

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add roadmap-data.json
          git diff --staged --quiet || git commit -m "chore: update roadmap data [skip ci]"
          git push
